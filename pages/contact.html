                    <div class="sld-track" id="sld-track">
                        <img src="../assets/Slideshow/1.jpg">

        <div class="background">
            <span class="ball"></span>
            <span class="ball"></span>

            <span class="ball"></span>

        </div>

        <div class="bulk">
            <div id="pgbx">
                <div id="frm">
                    <h2>Contact Us!</h2>
                    <form>
                        <label for="nmbx">Name</label>
                        <input id="nmbx" type="text" name="name">
                        <label for="mlbx">Email</label>
                        <input id="mlbx" type="email" name="email">
                        <label for="msg">Message</label>
                        <textarea id="msg" name="mes" rows="6"></textarea>
                    </form>
                    <button onclick="submitform()">Send Message</button>
                </div>
                <div id="rsp"></div>
            </div>

            <div class="btmblnk"></div>

            <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
            <script>
                (function() {
                    emailjs.init({
                        publicKey: "aY17g7dzaq0kuuLp_",
                    });
                })();

                function submitform() {
                    let nm = document.getElementById('nmbx').value;
                    let ml = document.getElementById('mlbx').value;
                    let mg = document.getElementById('msg').value;
                    if (nm.replaceAll(" ", "") == "" || ml.replaceAll(' ', '') == "" || mg.replaceAll(' ', '') == "") {
                        document.getElementById('rsp').textContent = "You are missing required information!";
                        document.getElementById('rsp').style.backgroundColor = "white";
                        return;
                    }
                    let param = {name: nm, email: ml, message: mg};

                    emailjs.send('service_l8pj5vs', 'template_wv1y1bj', param);

                    document.getElementById('rsp').textContent = "Thank you so much for contacting us " + nm + "!";
                    document.getElementById('rsp').style.backgroundColor = "white";

                    document.getElementById('nmbx').value = "";
                    document.getElementById('mlbx').value = "";
                    document.getElementById('msg').value = "";
                }
            </script>

            <script>
                let slideIndex = 0;
                let drpval = false;

                function plusSlides(n) {
                    slideIndex = (slideIndex + n + 11) % 11;
                    document.getElementById('sld-track').style.transform = `translateX(-${slideIndex * 100}%)`;
                }

                function drppres() {
                    drpval = !drpval;
                    updtdrp(drpval);
                }

                function updtdrp(n) {
                    document.getElementById("drp").classList.toggle('open', n);
                }

                document.addEventListener('click', function(e) {
                    if (!document.querySelector('.brgbx').contains(e.target) && drpval) {
                        drpval = false;
                        updtdrp(false);
                    }
                });

                let intervalID = setInterval(() => plusSlides(1), 10000);
            </script>
        </div>
    </body>
</html>
